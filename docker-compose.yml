services:
  redis:
    image: redis:8.4-alpine
    container_name: ai_zalo_redis
    restart: always
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-password123}
    volumes:
      - ai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ai_redis_data:
