name: AI Service CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/ai-deploy.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DOCKERHUB_AI_IMAGE: trungmai965/ai_zalo
  EC2_STACK_DIR: /home/ubuntu/zalo_stack
  AWS_REGION: ap-southeast-1

jobs:
  build-and-push:
    name: Build & Push AI Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push AI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_AI_IMAGE }}:latest
            ${{ env.DOCKERHUB_AI_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=ai-zalo
          cache-to: type=gha,mode=max,scope=ai-zalo

  deploy:
    name: Deploy AI Service via AWS SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run deploy command on EC2 via SSM
        shell: bash
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -e

          cat > ssm-params.json <<'JSON'
          {
            "commands": [
              "set -e",
              "cd /home/ubuntu/zalo_stack",
              "echo '>>> Checking required production files...'",
              "test -f .env",
              "test -f docker-compose.prod.yml",
              "echo '>>> Ensuring AI infrastructure containers are running...'",
              "docker compose -f docker-compose.prod.yml --env-file .env up -d ai_postgres ai_redis",
              "echo '>>> Pulling latest AI image...'",
              "docker compose -f docker-compose.prod.yml --env-file .env pull ai",
              "echo '>>> Running AI database migrations...'",
              "docker compose -f docker-compose.prod.yml --env-file .env run --rm ai npx prisma migrate deploy",
              "echo '>>> Restarting AI service...'",
              "docker compose -f docker-compose.prod.yml --env-file .env up -d --force-recreate ai",
              "echo '>>> Waiting for AI container to stay running...'",
              "sleep 15",
              "STATUS=$(docker inspect --format='{{.State.Status}}' ai_zalo_app_prod 2>/dev/null || echo not_found); echo \"AI container status: $STATUS\"; if [ \"$STATUS\" != running ]; then docker compose -f docker-compose.prod.yml --env-file .env logs --tail=100 ai; exit 1; fi",
              "echo 'AI service deploy completed.'"
            ]
          }
          JSON

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ai_zalo ${GITHUB_SHA}" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: $COMMAND_ID"

          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "[$i/90] SSM status: $STATUS"

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "SSM deploy failed."
                echo "----- STDOUT -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text || true
                echo "----- STDERR -----"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardErrorContent" \
                  --output text || true
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "SSM deploy timed out while waiting for command result."
          exit 1
