name: AI Service CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/ai-deploy.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DOCKERHUB_AI_IMAGE: trungmai965/ai_zalo
  EC2_STACK_DIR: ~/zalo_stack

jobs:
  build-and-push:
    name: Build & Push AI Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push AI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_AI_IMAGE }}:latest
            ${{ env.DOCKERHUB_AI_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=ai-zalo
          cache-to: type=gha,mode=max,scope=ai-zalo

  deploy:
    name: Deploy AI Service to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Restart AI service on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/zalo_stack

            echo ">>> Checking required production files..."
            test -f .env
            test -f docker-compose.prod.yml

            echo ">>> Ensuring AI infrastructure containers are running..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d ai_postgres ai_redis

            echo ">>> Pulling latest AI image..."
            docker compose -f docker-compose.prod.yml --env-file .env pull ai

            echo ">>> Running AI database migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env run --rm ai npx prisma migrate deploy

            echo ">>> Restarting AI service..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d --force-recreate ai

            echo ">>> Waiting for AI container to stay running..."
            sleep 15
            STATUS=$(docker inspect --format='{{.State.Status}}' ai_zalo_app_prod 2>/dev/null || echo "not_found")
            echo "AI container status: $STATUS"
            if [ "$STATUS" != "running" ]; then
              docker compose -f docker-compose.prod.yml --env-file .env logs --tail=100 ai
              exit 1
            fi

            echo "AI service deploy completed."
